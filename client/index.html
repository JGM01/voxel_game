<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Browser Gaming</title>
        <base data-trunk-public-url />
        <style type="text/css">
            :focus {
                outline: none;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #1a1a1a;
                color: #e0e0e0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            .root {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 0;
                height: 100vh;
                box-sizing: border-box;
            }

            h1 {
                margin: 0;
                font-size: 1.5rem;
                font-weight: 600;
                flex-shrink: 0;
                text-align: center;
                display: none;
            }

            .main-canvas {
                display: block;
                background-color: #000;
                width: 100vw;
                height: 100vh;
                flex: 1 1 100%;
            }
            
            #canvas:focus-within {
                outline: none;
            }

            .toolbar {
                margin-top: 16px;
                padding: 12px 20px;
                background-color: #2a2a2a;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                text-align: center;
                max-width: 1280px;
                width: 90vw;
                box-sizing: border-box;
                flex-shrink: 0;
            }

            .toolbar p {
                margin: 8px 0;
                line-height: 1.5;
            }

            .connect-panel {
                position: fixed;
                z-index: 2;
                top: 16px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 8px;
                width: 100%;
                max-width: 900px;
                box-sizing: border-box;
                padding: 0 16px;
            }

            .connect-panel.connected {
                display: none;
            }

            .connect-panel input {
                min-width: min(560px, 100%);
                flex: 1;
                padding: 8px 10px;
                border: 1px solid #555;
                border-radius: 4px;
                background: #111;
                color: #fff;
                font: inherit;
            }

            .connect-panel button {
                padding: 8px 14px;
                border: 1px solid #777;
                border-radius: 4px;
                background: #333;
                color: #fff;
                font: inherit;
                cursor: pointer;
            }

            .connect-panel button:disabled {
                cursor: default;
                opacity: 0.55;
            }

            .connect-status {
                width: 100%;
                min-height: 1.5em;
                text-align: center;
                color: #ddd;
            }

            kbd {
                background-color: #444;
                padding: 3px 6px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
                color: #fff;
                border-bottom: 2px solid #222;
            }
        </style>
    </head>

    <body>
        <link data-trunk rel="rust" href="Cargo.toml" data-target-name="app_core" />
        <div class="root">
            <h1>Browser Gaming</h1>
            <div class="connect-panel" id="connect-panel">
                <input id="server-url" type="text" value="ws://127.0.0.1:3000/ws" spellcheck="false" />
                <button id="connect-button" type="button">Connect</button>
                <div class="connect-status" id="connect-status"></div>
            </div>
            
            <canvas class="main-canvas" id="canvas" tabindex="0"></canvas>
            
            <div class="toolbar">
                <p><strong>Movement:</strong> <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move | <kbd>Space</kbd> / <kbd>Shift</kbd> to fly up and down.</p>
                <p><strong>Camera:</strong> Left-click the canvas to lock cursor and look around. Press <kbd>Esc</kbd> to unlock.</p>
            </div>
        </div>
    </body>
</html>

        </div>
    </body>
</html>
