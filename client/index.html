<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Browser Gaming</title>
        <base data-trunk-public-url />
        <style type="text/css">
            :focus {
                outline: none;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: #1a1a1a;
                color: #e0e0e0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            .root {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
                height: 100vh;
                box-sizing: border-box;
            }

            h1 {
                margin-top: 0;
                margin-bottom: 16px;
                font-size: 1.5rem;
                font-weight: 600;
                flex-shrink: 0;
                text-align: center;
            }

            .canvas-container {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                border-radius: 8px;
                overflow: hidden;
                background-color: #000;
                flex-shrink: 1;
                min-height: 0;
                max-height: 900px;
                max-width: 100%;
                aspect-ratio: 16 / 9;
            }

            .main-canvas {
                display: block;
                width: 100%;
                height: 100%;
            }
            
            #canvas:focus-within {
                outline: none;
            }

            .toolbar {
                margin-top: 16px;
                padding: 12px 20px;
                background-color: #2a2a2a;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                text-align: center;
                max-width: 1600px;
                width: 100%;
                box-sizing: border-box;
                flex-shrink: 0;
            }

            .toolbar p {
                margin: 8px 0;
                line-height: 1.5;
            }

            kbd {
                background-color: #444;
                padding: 3px 6px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
                color: #fff;
                border-bottom: 2px solid #222;
            }
        </style>
    </head>

    <body>
        <link data-trunk rel="rust" href="Cargo.toml" data-target-name="app" />
        <div class="root">
            <h1>Browser Gaming</h1>
            
            <div class="canvas-container">
                <canvas class="main-canvas" id="canvas"></canvas>
            </div>
            
            <div class="toolbar">
                <p><strong>Movement:</strong> <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move | <kbd>Space</kbd> / <kbd>Shift</kbd> to fly up and down.</p>
                <p><strong>Camera:</strong> Left-click the canvas to lock cursor and look around. Press <kbd>Esc</kbd> to unlock.</p>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const canvas = document.getElementById("canvas");
                if (canvas) {
                    canvas.addEventListener("mousedown", (e) => {
                        // Only lock on Left Click
                        if (e.button === 0) {
                            canvas.requestPointerLock();
                        }
                    });
                }
            });
        </script>
    </body>
</html>
